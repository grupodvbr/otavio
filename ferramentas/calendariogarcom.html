<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Calendário de Reservas</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
--bg:#020617;
--card:#0f172a;
--text:#e2e8f0;
--muted:#64748b;
--line:#1e293b;

--blue:#3b82f6;
--green:#22c55e;
--yellow:#f59e0b;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Inter,system-ui;
background:var(--bg);
color:var(--text);
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
}

.title{
font-weight:800;
font-size:1.1rem;
}

/* BOTÕES */
.btn{
padding:10px;
border-radius:10px;
border:1px solid var(--line);
background:var(--card);
color:#fff;
cursor:pointer;
}

/* CALENDÁRIO */
.cal{
padding:10px;
}

.cal-grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
}

.cal-dow{
text-align:center;
font-size:.75rem;
color:var(--muted);
}

.cal-day{
background:var(--card);
border:1px solid var(--line);
border-radius:12px;
min-height:70px;
position:relative;
padding:6px;
}

.cal-day.out{
opacity:.3;
}

.num{
position:absolute;
top:4px;
right:6px;
font-weight:700;
font-size:.75rem;
}

.tags{
position:absolute;
bottom:4px;
left:4px;
right:4px;
display:flex;
flex-wrap:wrap;
gap:3px;
}

/* TAGS */
.tag{
font-size:.6rem;
padding:2px 5px;
border-radius:999px;
font-weight:700;
}

.pend{background:#78350f;color:#fcd34d}
.conf{background:#1e3a8a;color:#93c5fd}
.done{background:#14532d;color:#86efac}

</style>
</head>

<body>

<div class="header">
<button id="prev" class="btn">◀</button>
<div class="title" id="title">Carregando...</div>
<button id="next" class="btn">▶</button>
</div>

<div class="cal">
<div class="cal-grid" id="dow"></div>
<div class="cal-grid" id="grid"></div>
</div>

<script>

/* ===== SUPABASE ===== */
const SUPABASE_URL = "https://mybsriouiwqsdufujbsc.supabase.co"
const SUPABASE_KEY = "sb_publishable_AUyBEIVCAMUoXwDKUmlqSw_v8EY8rVN"

const supabase = window.supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
)

/* ===== ESTADO ===== */
const state = {
mes:new Date().getMonth(),
ano:new Date().getFullYear(),
reservas:[]
}

/* ===== DIAS ===== */
const dias = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb']
document.getElementById('dow').innerHTML =
dias.map(d=>`<div class="cal-dow">${d}</div>`).join('')

const meses = [
'Janeiro','Fevereiro','Março','Abril','Maio','Junho',
'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'
]

const ymd = d=>{
const z=n=>String(n).padStart(2,'0')
return `${d.getFullYear()}-${z(d.getMonth()+1)}-${z(d.getDate())}`
}

/* ===== CARREGAR DADOS ===== */
async function load(){

try{

const inicio =
`${state.ano}-${String(state.mes+1).padStart(2,'0')}-01`

const fim =
`${state.ano}-${String(state.mes+2).padStart(2,'0')}-01`

const {data,error} = await supabase
.from("reservas_delicia")
.select("*")
.gte("datahora",inicio)
.lt("datahora",fim)

if(error){
console.error(error)
state.reservas=[]
}else{
state.reservas = data || []
}

}catch(e){
console.error(e)
state.reservas=[]
}

render()
}

/* ===== RENDER ===== */
function render(){

document.getElementById("title").textContent =
`${meses[state.mes]} de ${state.ano}`

const grid = document.getElementById("grid")
grid.innerHTML=""

/* início da grade */
const first = new Date(state.ano,state.mes,1)
const start = new Date(first)
start.setDate(1-first.getDay())

for(let i=0;i<42;i++){

const d = new Date(start)
d.setDate(start.getDate()+i)

const inMonth = d.getMonth()===state.mes

const itens = state.reservas.filter(r=>{
if(!r.datahora) return false
return ymd(new Date(r.datahora))===ymd(d)
})

const pend = itens.filter(r=>r.status==="Pendente").length
const conf = itens.filter(r=>r.status==="Confirmada").length
const done = itens.filter(r=>r.status==="Concluída").length

const el = document.createElement("div")
el.className = "cal-day"+(inMonth?"":" out")

el.innerHTML = `
<div class="num">${d.getDate()}</div>

<div class="tags">
${pend?`<span class="tag pend">P ${pend}</span>`:""}
${conf?`<span class="tag conf">C ${conf}</span>`:""}
${done?`<span class="tag done">✔ ${done}</span>`:""}
</div>
`

grid.appendChild(el)
}

}

/* ===== NAVEGAÇÃO ===== */
document.getElementById("prev").onclick = ()=>{
state.mes--
if(state.mes<0){
state.mes=11
state.ano--
}
load()
}

document.getElementById("next").onclick = ()=>{
state.mes++
if(state.mes>11){
state.mes=0
state.ano++
}
load()
}

/* ===== INICIAR ===== */
load()

</script>

</body>
</html>

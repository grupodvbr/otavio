<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>ESCALA MERCATTO PRO</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:Inter;
  background:#020617;
  color:white;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#020617;
  border-bottom:1px solid #1e293b;
}

button{
  background:#2563eb;
  border:none;
  color:white;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
}

/* CALENDARIO */
.calendar{
  display:grid;
  grid-template-columns: repeat(7,1fr);
  gap:6px;
  padding:10px;
}

.day{
  background:#0f172a;
  border-radius:10px;
  padding:6px;
  min-height:110px;
  cursor:pointer;
}

.day:hover{background:#1e293b;}

.day-number{
  font-size:12px;
  opacity:0.6;
}

.func{
  font-size:10px;
  padding:2px;
  border-radius:4px;
  margin-top:2px;
}

.manha{background:#22c55e;}
.tarde{background:#f59e0b;}
.noite{background:#3b82f6;}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  display:none;
  align-items:center;
  justify-content:center;
}

.box{
  background:#0f172a;
  padding:20px;
  border-radius:12px;
  width:350px;
}

input,select{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
  border:none;
}

/* LISTA */
.lista{
  max-height:150px;
  overflow:auto;
  margin-top:10px;
}

.item{
  background:#1e293b;
  padding:5px;
  margin-top:5px;
  border-radius:6px;
  display:flex;
  justify-content:space-between;
}

.preview{
  font-size:12px;
  margin-top:5px;
  color:#94a3b8;
}

</style>
</head>

<body>

<header>
  <button onclick="mesAnterior()">◀</button>
  <b id="mes"></b>
  <div>
    <button onclick="abrirCadastro()">+ Funcionário</button>
    <button onclick="mesProximo()">▶</button>
  </div>
</header>

<div id="calendar" class="calendar"></div>

<!-- MODAL ESCALA -->
<div id="modal" class="modal">
  <div class="box">
    <h3 id="data"></h3>

    <select id="funcionario"></select>

    <select id="turno">
      <option value="manha">MANHÃ</option>
      <option value="tarde">TARDE</option>
      <option value="noite">NOITE</option>
    </select>

    <button onclick="add()">Adicionar</button>

    <div id="lista" class="lista"></div>

    <button onclick="fechar()">Fechar</button>
  </div>
</div>

<!-- MODAL CADASTRO -->
<div id="cadastro" class="modal">
  <div class="box">
    <h3>Novo Funcionário</h3>

    <input id="nome" placeholder="Nome">
    <input id="numero" placeholder="Número">

    <select id="sexo">
      <option>MASCULINO</option>
      <option>FEMININO</option>
    </select>

    <input type="date" id="nascimento">
    <input type="date" id="contratacao">

    <div class="preview" id="preview"></div>

    <button onclick="salvarFuncionario()">Salvar</button>
    <button onclick="fecharCadastro()">Fechar</button>
  </div>
</div>

<script>

const sb = supabase.createClient(
  "https://dxkszikemntfusfyrzos.supabase.co",
  "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
)

let dataAtual = new Date()
let funcionarios=[]
let escalas=[]
let dataSelecionada=null

// ================= FUNCIONARIOS =================
async function loadFuncionarios(){
  const {data} = await sb.from("funcionarios_mercatto").select("*")
  funcionarios=data

  const sel=document.getElementById("funcionario")
  sel.innerHTML=""
  data.forEach(f=>{
    sel.innerHTML+=`<option value="${f.id}">${f.nome}</option>`
  })
}

// ================= ESCALA =================
async function loadEscala(){
  const {data}=await sb.from("escala_funcionarios").select("*")
  escalas=data
}

// ================= CALENDARIO =================
async function render(){

  await loadEscala()

  const cal=document.getElementById("calendar")
  cal.innerHTML=""

  const ano=dataAtual.getFullYear()
  const mes=dataAtual.getMonth()

  document.getElementById("mes").innerText=
    dataAtual.toLocaleString("pt-BR",{month:"long",year:"numeric"})

  const dias=new Date(ano,mes+1,0).getDate()

  for(let i=1;i<=dias;i++){

    const dataStr=`${ano}-${String(mes+1).padStart(2,"0")}-${String(i).padStart(2,"0")}`

    const d=document.createElement("div")
    d.className="day"
    d.innerHTML=`<div class="day-number">${i}</div>`

    escalas.filter(e=>e.data===dataStr).forEach(e=>{
      d.innerHTML+=`<div class="func ${e.turno}">${e.nome}</div>`
    })

    d.onclick=()=>abrir(dataStr)

    cal.appendChild(d)
  }
}

// ================= ESCALA =================
function abrir(data){
  dataSelecionada=data
  modal.style.display="flex"
  document.getElementById("data").innerText=data
  renderLista()
}

function fechar(){ modal.style.display="none" }

async function add(){
  const id=funcionario.value
  const turno=document.getElementById("turno").value
  const f=funcionarios.find(x=>x.id===id)

  await sb.from("escala_funcionarios").insert({
    funcionario_id:f.id,
    nome:f.nome,
    numero:f.numero,
    data:dataSelecionada,
    turno
  })

  render()
  renderLista()
}

function renderLista(){
  lista.innerHTML=""
  escalas.filter(e=>e.data===dataSelecionada).forEach(e=>{
    lista.innerHTML+=`
      <div class="item">
        ${e.nome} (${e.turno})
        <span onclick="remover('${e.id}')">❌</span>
      </div>`
  })
}

async function remover(id){
  await sb.from("escala_funcionarios").delete().eq("id",id)
  render()
  renderLista()
}

// ================= CADASTRO =================
function abrirCadastro(){ cadastro.style.display="flex" }
function fecharCadastro(){ cadastro.style.display="none" }

async function salvarFuncionario(){

  await sb.from("funcionarios_mercatto").insert({
    nome:nome.value,
    numero:numero.value,
    sexo:sexo.value,
    data_nascimento:nascimento.value,
    data_contratacao:contratacao.value
  })

  fecharCadastro()
  loadFuncionarios()
}

// ================= PREVIEW =================
[nascimento,contratacao].forEach(el=>{
  el.onchange=()=>{
    if(!nascimento.value||!contratacao.value) return

    const nasc=new Date(nascimento.value)
    const cont=new Date(contratacao.value)

    const idade=new Date().getFullYear()-nasc.getFullYear()
    const dias=(new Date()-cont)/(1000*60*60*24)

    preview.innerText=
      `Idade: ${idade} anos | Experiência: ${Math.floor(dias)} dias`
  }
})

// ================= NAV =================
function mesAnterior(){ dataAtual.setMonth(dataAtual.getMonth()-1); render() }
function mesProximo(){ dataAtual.setMonth(dataAtual.getMonth()+1); render() }

// INIT
loadFuncionarios()
render()

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Configurações Financeiras</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family:Inter;
  background:#f8fafc;
  margin:0;
}

.container{
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.card{
  background:#fff;
  border-radius:16px;
  padding:16px;
  box-shadow:0 10px 25px rgba(0,0,0,.06);
  height:420px;
  display:flex;
  flex-direction:column;
}

h2{
  font-size:16px;
  margin-bottom:10px;
}

input{
  padding:10px;
  border-radius:10px;
  border:1px solid #e5e7eb;
  margin-bottom:10px;
}

.list{
  flex:1;
  overflow:auto;
}

.item{
  padding:8px;
  border-bottom:1px solid #eee;
  font-size:13px;
}

button{
  background:#2563eb;
  color:#fff;
  border:none;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
  <div class="grid">

    <!-- PESSOAS -->
    <div class="card">
      <h2>Fornecedores / Clientes</h2>
      <input placeholder="Buscar..." onkeyup="buscar('pessoas',this.value)">
      <div class="list" id="pessoas"></div>
      <input id="nomePessoa" placeholder="Nome">
      <button onclick="addPessoa()">Adicionar</button>
    </div>

    <!-- CONTAS -->
    <div class="card">
      <h2>Contas Bancárias</h2>
      <input placeholder="Buscar..." onkeyup="buscar('contas',this.value)">
      <div class="list" id="contas"></div>
      <input id="nomeConta" placeholder="Banco / Conta">
      <button onclick="addConta()">Adicionar</button>
    </div>

    <!-- PLANO -->
    <div class="card">
      <h2>Plano de Contas</h2>
      <input placeholder="Buscar..." onkeyup="buscar('plano',this.value)">
      <div class="list" id="plano"></div>
      <input id="nomePlano" placeholder="Nome">
      <button onclick="addPlano()">Adicionar</button>
    </div>

    <!-- VAZIO -->
    <div class="card">
      <h2>Outros</h2>
    </div>

  </div>
</div>

<script>

const sb = supabase.createClient(
  "https://ehxrrpsiksceljmhsfxk.supabase.co",
  "sb_publishable_Jm2ZQKzPS3gNPCKSjFAmYQ_WNMYwF1j"
);

/* ================= LOAD ================= */

async function carregar(){

  const {data:pessoas} = await sb.from("pessoas").select("*")
  const {data:contas} = await sb.from("contas_bancarias").select("*")
  const {data:plano} = await sb.from("plano_contas").select("*")

  render("pessoas",pessoas)
  render("contas",contas)
  render("plano",plano)
}

function render(id,data){
  const el = document.getElementById(id)
  el.innerHTML=""

  data.forEach(i=>{
    const div = document.createElement("div")
    div.className="item"
    div.innerText = i.nome || i.banco
    el.appendChild(div)
  })
}

/* ================= ADD ================= */

async function addPessoa(){
  const nome = document.getElementById("nomePessoa").value

  await sb.from("pessoas").insert([{nome,tipo:"FORNECEDOR"}])

  carregar()
}

async function addConta(){
  const nome = document.getElementById("nomeConta").value

  await sb.from("contas_bancarias").insert([{banco:nome}])

  carregar()
}

async function addPlano(){
  const nome = document.getElementById("nomePlano").value

  await sb.from("plano_contas").insert([{nome,tipo:"DESPESA"}])

  carregar()
}

/* ================= BUSCA ================= */

function buscar(lista,valor){
  valor = valor.toLowerCase()

  document.querySelectorAll(`#${lista} .item`).forEach(el=>{
    el.style.display = el.innerText.toLowerCase().includes(valor) ? "block":"none"
  })
}

carregar()

</script>

</body>
</html>

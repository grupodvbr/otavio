<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Disparo em Massa</title>

<style>
body{
  font-family:Inter;
  background:#0f172a;
  color:#fff;
  padding:20px;
}

button{
  width:100%;
  padding:14px;
  margin:10px 0;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:#fff;
  font-weight:700;
  cursor:pointer;
}

.progress{
  margin-top:20px;
  height:20px;
  background:#1e293b;
  border-radius:10px;
  overflow:hidden;
}

.bar{
  height:100%;
  background:#22c55e;
  width:0%;
  transition:.3s;
}

.log{
  margin-top:20px;
  max-height:200px;
  overflow:auto;
  font-size:12px;
}
</style>
</head>

<body>

<h2>📢 Disparo em Massa</h2>

<button onclick="disparar('confirmao_de_reserva')">
Iniciar Disparo
</button>

<div class="progress">
  <div class="bar" id="bar"></div>
</div>

<div id="info"></div>

<div class="log" id="log"></div>

<script>

let interval = null

async function disparar(template){

  await fetch("/api/send-template-massa",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ template })
  })

  interval = setInterval(atualizar, 1000)
}

async function atualizar(){

  const res = await fetch("/api/send-template-massa")
  const data = await res.json()

  const total = data.total || 0
  const enviados = data.enviados || 0
  const erros = data.erros || 0

  const percent = total ? ((enviados+erros)/total)*100 : 0

  document.getElementById("bar").style.width = percent + "%"

  document.getElementById("info").innerHTML = `
    📊 ${enviados} enviados<br>
    ❌ ${erros} erros<br>
    👥 ${total} total<br>
    🔄 Atual: ${data.atual || "-"}<br>
    📈 ${percent.toFixed(0)}%
  `

  const log = document.getElementById("log")

  log.innerHTML = data.logs
    .slice(-20)
    .map(l => `
      <div>
        ${l.telefone} - 
        ${l.status === "enviado" ? "✅" : "❌"}
      </div>
    `)
    .join("")

  if(data.finalizado){
    clearInterval(interval)
    alert("✅ Disparo finalizado!")
  }

}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>GRUPO DV - MERCATTO DELÍCIA</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f8fafc;
  --bg-2:#f1f5f9;

  --primary:#2563eb;
  --primary-soft:#e0e7ff;

  --text:#0f172a;
  --text-muted:#64748b;

  --border:#e5e7eb;

  --sidebar:#ffffff;
  --header:#ffffff;

  --shadow:0 10px 30px rgba(0,0,0,.08);
}

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Inter",sans-serif;
}

body{
  height:100vh;
  background:var(--bg);
  overflow:hidden;
}

.app{
  display:flex;
  height:100vh;
  width:100vw;
}

/* ================= SIDEBAR ================= */
.sidebar{
  position:fixed;
  left:0;
  top:0;
  width:260px;
  height:100vh;

  background:var(--sidebar);
  border-right:1px solid var(--border);

  display:flex;
  flex-direction:column;

  transform:translateX(-100%);
  transition:.3s cubic-bezier(.4,0,.2,1);

  z-index:60;
}

.sidebar.open{
  transform:translateX(0);
}

/* ================= LOGO ================= */
.logo-area{
  padding:20px;
  text-align:center;
  border-bottom:1px solid var(--border);
}

.logo-text{
  font-size:20px;
  font-weight:900;
  color:var(--primary);
}

/* ================= MENU ================= */
.menu{
  padding:14px;
  overflow-y:auto;
}

.menu-item{
  display:flex;
  align-items:center;
  gap:12px;

  padding:12px 14px;
  margin:6px 0;

  font-size:14px;
  color:var(--text);

  border-radius:12px;
  cursor:pointer;
  transition:.2s;
}

.menu-item img{
  width:18px;
  opacity:.7;
}

.menu-item:hover{
  background:var(--primary-soft);
  color:var(--primary);
}

.menu-item.active{
  background:var(--primary-soft);
  border-left:4px solid var(--primary);
  color:var(--primary);
  font-weight:700;
}

/* SUBMENU */
.submenu{
  display:none;
  margin:6px 0 12px 44px;
}

.submenu a{
  display:block;
  padding:8px 10px;
  font-size:13px;
  color:var(--text-muted);
  border-radius:8px;
}

.submenu a:hover{
  background:#eef2ff;
  color:var(--primary);
}

/* ================= HEADER ================= */
.header{
  height:60px;
  background:var(--header);
  border-bottom:1px solid var(--border);

  display:flex;
  align-items:center;
  justify-content:space-between;

  padding:0 20px;

  box-shadow:var(--shadow);
  z-index:10;
}

/* ================= BOTÕES ================= */
.menu-mobile-btn{
  display:flex;
  align-items:center;
  justify-content:center;

  width:42px;
  height:42px;

  border-radius:12px;

  background:var(--primary-soft);

  cursor:pointer;
  transition:.2s;

  box-shadow:0 6px 16px rgba(0,0,0,.08);
}

.menu-mobile-btn img{
  width:18px;
  filter: brightness(0) saturate(100%) invert(33%) sepia(98%) saturate(1200%) hue-rotate(210deg);
}

.menu-mobile-btn:hover{
  background:var(--primary);
}

.menu-mobile-btn:hover img{
  filter: brightness(0) invert(1);
}

/* BOTÃO VOLTAR */
.btn-voltar{
  width:40px;
  height:40px;

  display:flex;
  align-items:center;
  justify-content:center;

  border-radius:12px;

  background:var(--primary-soft);
  color:var(--primary);

  font-size:18px;
  font-weight:800;

  cursor:pointer;
  transition:.2s;
}

.btn-voltar:hover{
  background:var(--primary);
  color:#fff;
}

/* ================= IFRAME ================= */
iframe{
  border:none;
  width:100%;
  height:calc(100vh - 60px);
  background:var(--bg);
}

/* ================= OVERLAY ================= */
.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;

  background:rgba(0,0,0,.35);
  backdrop-filter:blur(4px);

  opacity:0;
  pointer-events:none;
  transition:.25s;

  z-index:55;
}

.overlay.active{
  opacity:1;
  pointer-events:auto;
}

/* ================= SCROLL ================= */
.menu::-webkit-scrollbar{
  width:6px;
}

.menu::-webkit-scrollbar-thumb{
  background:#cbd5f5;
  border-radius:10px;
}
</style>
</head>

<body>
<div class="app">

  <div class="nav-hover-zone"></div>

  <!-- SIDEBAR -->
  <div class="sidebar">

    <div class="logo-area">
      <div class="logo-text">
        MERCATTO DELÍCIA
      </div>
    </div>

   <div class="menu">

  <!-- DASHBOARD -->
  <div class="menu-item" onclick="openPage('inicio/dashboard.html')" data-page="inicio/dashboard.html">
    <img src="https://cdn-icons-png.flaticon.com/512/1828/1828859.png">
    Dashboard
  </div>

     
  <!-- Operacional -->
  <div class="menu-item" onclick="toggleSub('sub_encontrar')">
    <img src="https://cdn-icons-png.flaticon.com/512/1087/1087840.png">
    Operacional
  </div>

  <div class="submenu" id="sub_encontrar">
    <a onclick="openPage('restaurante/administracao/requisicoesrecebidas.html')" data-page="buscar.html">Requisições de mercadorias</a>
    <a onclick="openPage('ferramentas/apresentacoes/links.html')" data-page="ferramentas/apresentacoes/links.html">Links</a>
  </div>



  <!-- WHATSAPP -->
  <div class="menu-item" onclick="openPage('otto/whatsapp.html')" data-page="otto/whatsapp.html">
    <img src="https://cdn-icons-png.flaticon.com/512/3670/3670051.png">
    WhatsApp
  </div>

  <!-- FICHA TECNICA -->
  <div class="menu-item" onclick="toggleSub('sub_ficha')">
    <img src="https://cdn-icons-png.flaticon.com/512/1046/1046784.png">
    Ficha técnica
  </div>

  <div class="submenu" id="sub_ficha">
    <a onclick="openPage('restaurante/fichas.html')" data-page="restaurante/fichas.html">Fichas</a>
    <a onclick="openPage('relatórios/caderno.html')" data-page="relatórios/caderno.html">Livro de receitas</a>
    <a onclick="openPage('relatórios/historico.html')" data-page="relatórios/historico.html">Histórico</a>
  </div>



  <!-- COTAÇÃO -->
  <div class="menu-item" onclick="toggleSub('sub_monitorar')">
    <img src="https://cdn-icons-png.flaticon.com/512/2331/2331941.png">
    Restaurante
  </div>

  <div class="submenu" id="sub_monitorar">
    <a onclick="openPage('restaurante/reservas.html')" data-page="restaurante/reservas.html">Reservas de mesas</a>
    <a onclick="openPage(' restaurante/agendacantores.html')" data-page=" restaurante/agendacantores.html">Agenda de cantores</a>

  </div>

  <!-- AGENTE -->
  <div class="menu-item" onclick="openPage('otto/agente.html')" data-page="otto/agente.html">
    <img src="https://cdn-icons-png.flaticon.com/512/4712/4712035.png">
    Agente de IA
  </div>
     
  <!-- APP / SISTEMA -->
  <div class="menu-item" onclick="openPage('ferramentas/aplicativos.html')" data-page="ferramentas/aplicativos.html">
    <img src="https://cdn-icons-png.flaticon.com/512/1828/1828919.png">
    Aplicativos
  </div>
     
  <!-- CONFIG -->
  <div class="menu-item" onclick="openPage('configuracoes.html')" data-page="configuracoes.html">
    <img src="https://cdn-icons-png.flaticon.com/512/2099/2099058.png">
    Configurações
  </div>

</div>
  </div>



 <div class="header">

  <div style="display:flex;align-items:center;gap:12px">

    <!-- BOTÃO MENU -->
    <div class="menu-mobile-btn" onclick="toggleMobileMenu()">
      <img src="https://cdn-icons-png.flaticon.com/512/1828/1828859.png" style="width:18px;">
    </div>

    <!-- BOTÃO VOLTAR -->
    <div class="btn-voltar" onclick="voltarPagina()">
      ←
    </div>

  </div>

  <div class="user-area">
    <span id="userMail"></span>
    <span class="logout" onclick="logout()">SAIR</span>
  </div>

</div>

<iframe id="frame" src="inicio/dashboard.html"></iframe>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabaseClient=supabase.createClient(
"https://mblvyircwsaxaslklzky.supabase.co",
"sb_publishable_oN2CuBzXHaUF7NHYS_M7aw_tBqVeD-x"
);

function toggleSub(id){
const el=document.getElementById(id);
el.style.display=el.style.display==="block"?"none":"block";
}

function toggleMobileMenu(){
  const sidebar = document.querySelector(".sidebar");
  const overlay = document.querySelector(".overlay");

  sidebar.classList.toggle("open");
  overlay.classList.toggle("active");
}


function openPage(page){
  document.getElementById("frame").src = page;

  localStorage.setItem("paginaAtual", page);

  highlightMenu(page);

  // 🔥 FECHA SEMPRE (desktop + mobile)
  document.querySelector(".sidebar").classList.remove("open");
}

function highlightMenu(page){
document.querySelectorAll(".menu-item").forEach(i=>i.classList.remove("active"));
document.querySelectorAll(".submenu a").forEach(i=>i.classList.remove("active-sub"));
const sub=document.querySelector(`a[data-page="${page}"]`);
if(sub){
sub.classList.add("active-sub");
sub.closest(".submenu").previousElementSibling.classList.add("active");
sub.closest(".submenu").style.display="block";
}
}

function logout(){
localStorage.removeItem("usuarioEmail");
location.href="login.html";
}

window.onload = function(){

  const paginaSalva = localStorage.getItem("paginaAtual");

  if(paginaSalva){
    document.getElementById("frame").src = paginaSalva;
    highlightMenu(paginaSalva);
  }

}


function voltarPagina(){
  const frame = document.getElementById("frame");
  frame.contentWindow.history.back();
}
</script>

</body>
</html>

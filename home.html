<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>GRUPO DV - MERCATTO DELÍCIA</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f8fafc;
  --bg-2:#f1f5f9;

  --primary:#2563eb;
  --primary-soft:#e0e7ff;

  --text:#0f172a;
  --text-muted:#64748b;

  --border:#e5e7eb;

  --sidebar:#ffffff;
  --header:#ffffff;

  --shadow:0 8px 25px rgba(0,0,0,.08);
}

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Inter",sans-serif;
}

body{
  height:100vh;
  background:var(--bg);
  overflow:hidden;
}

.app{
  display:flex;
  height:100vh;
  width:100vw;
}

/* ===================== SIDEBAR ===================== */
.nav-hover-zone{
  position:fixed;
  left:0;
  top:0;
  width:14px;
  height:100vh;
  z-index:50;
}

.sidebar{
  position:fixed;
  left:0;
  top:0;
  width:260px;
  height:100vh;

  background:var(--sidebar);

  border-right:1px solid var(--border);

  display:flex;
  flex-direction:column;

  transform:translateX(-260px);
  transition:.25s ease;
  z-index:60;
}



/* MOBILE */
.sidebar{
  transform:translateX(-260px);
  transition:.25s ease;
}

.sidebar.open{
  transform:translateX(0);
}

/* MOBILE */
@media(max-width:768px){
  .nav-hover-zone{display:none}
  .sidebar{transform:translateX(-100%)}
}

/* ===================== LOGO ===================== */
.logo-area{
  padding:20px;
  text-align:center;
  border-bottom:1px solid var(--border);
}

.logo-area img{
  width:150px;
}

/* ===================== MENU ===================== */
.menu{
  padding:12px;
  overflow-y:auto;
}

.menu-item{
  display:flex;
  align-items:center;
  gap:12px;

  padding:12px 14px;
  margin:6px 0;

  font-size:14px;
  color:var(--text);

  border-radius:10px;
  cursor:pointer;
  transition:.15s;
}

.menu-item img{
  width:18px;
  opacity:.6;
}

.menu-item:hover{
  background:var(--primary-soft);
  color:var(--primary);
}

.menu-item.active{
  background:var(--primary-soft);
  border-left:4px solid var(--primary);
  color:var(--primary);
  font-weight:700;
}

/* SUBMENU */
.submenu{
  display:none;
  margin:6px 0 12px 48px;
}

.submenu a{
  display:block;
  padding:8px 10px;
  font-size:13px;
  color:var(--text-muted);
  border-radius:8px;
  cursor:pointer;
}

.submenu a:hover{
  background:#f1f5f9;
  color:var(--primary);
}

.submenu a.active-sub{
  background:#eef2ff;
  color:var(--primary);
  font-weight:600;
}

/* ===================== MAIN ===================== */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* ===================== HEADER ===================== */
.header{
  height:60px;
  background:var(--header);
  border-bottom:1px solid var(--border);

  display:flex;
  align-items:center;
  justify-content:space-between;

  padding:0 20px;

  box-shadow:var(--shadow);
}

.logo-title{
  font-size:18px;
  font-weight:800;
  color:var(--primary);
  letter-spacing:1px;
}

.user-area{
  display:flex;
  align-items:center;
  gap:16px;
  font-size:13px;
  color:var(--text-muted);
}

.logout{
  cursor:pointer;
  font-weight:700;
  color:var(--primary);
}

.logout:hover{
  opacity:.8;
}

/* MOBILE BUTTON */
.menu-mobile-btn{
  display:none;
  font-size:22px;
  cursor:pointer;
  color:var(--primary);
}

@media(max-width:768px){
  .menu-mobile-btn{
    display:block;
  }
}

/* ===================== IFRAME ===================== */
iframe{
  border:none;
  width:100%;
  height:calc(100vh - 60px);
  background:var(--bg);
}

/* ===================== SCROLL ===================== */
.menu::-webkit-scrollbar{
  width:6px;
}

.menu::-webkit-scrollbar-thumb{
  background:#cbd5f5;
  border-radius:10px;
}






.logo-text{
  font-size:20px;
  font-weight:900;
  letter-spacing:.5px;

  color:var(--primary);

  text-align:center;
  line-height:1.2;
}

.menu-indicator{
  position:fixed;
  left:0;
  top:50%;
  transform:translateY(-50%);

  width:34px;
  height:70px;

  background: rgba(37, 99, 235, 0.5); /* azul com transparência */
  backdrop-filter: blur(6px);
  color:#fff;

  display:flex;
  align-items:center;
  justify-content:center;

  border-radius:0 10px 10px 0;

  font-size:18px;
  font-weight:900;

  cursor:pointer;

  box-shadow:0 10px 30px rgba(0,0,0,.2);

  z-index:70;
  transition:.2s;
}

.menu-indicator:hover{
  background:#1d4ed8;
}


.sidebar:hover ~ .menu-indicator{
  opacity:0;
  pointer-events:none;
}
</style>
</head>

<body>
<div class="app">

  <div class="nav-hover-zone"></div>

  <!-- SIDEBAR -->
  <div class="sidebar">

    <div class="logo-area">
      <div class="logo-text">
        MERCATTO DELÍCIA
      </div>
    </div>

   <div class="menu">

  <!-- DASHBOARD -->
  <div class="menu-item" onclick="openPage('inicio/dashboard.html')" data-page="inicio/dashboard.html">
    <img src="https://cdn-icons-png.flaticon.com/512/1828/1828859.png">
    Dashboard
  </div>

     
  <!-- Operacional -->
  <div class="menu-item" onclick="toggleSub('sub_encontrar')">
    <img src="https://cdn-icons-png.flaticon.com/512/1087/1087840.png">
    Operacional
  </div>

  <div class="submenu" id="sub_encontrar">
    <a onclick="openPage('restaurante/administracao/requisicoesrecebidas.html')" data-page="buscar.html">Requisições de mercadorias</a>
    <a onclick="openPage('ferramentas/apresentacoes/links.html')" data-page="ferramentas/apresentacoes/links.html">Links</a>
  </div>



  <!-- WHATSAPP -->
  <div class="menu-item" onclick="openPage('otto/whatsapp.html')" data-page="otto/whatsapp.html">
    <img src="https://cdn-icons-png.flaticon.com/512/3670/3670051.png">
    WhatsApp
  </div>

  <!-- FICHA TECNICA -->
  <div class="menu-item" onclick="toggleSub('sub_ficha')">
    <img src="https://cdn-icons-png.flaticon.com/512/1046/1046784.png">
    Ficha técnica
  </div>

  <div class="submenu" id="sub_ficha">
    <a onclick="openPage('restaurante/fichas.html')" data-page="restaurante/fichas.html">Fichas</a>
    <a onclick="openPage('relatórios/caderno.html')" data-page="relatórios/caderno.html">Livro de receitas</a>
    <a onclick="openPage('relatórios/historico.html')" data-page="relatórios/historico.html">Histórico</a>
  </div>



 

  <!-- COTAÇÃO -->
  <div class="menu-item" onclick="toggleSub('sub_monitorar')">
    <img src="https://cdn-icons-png.flaticon.com/512/2331/2331941.png">
    Restaurante
  </div>

  <div class="submenu" id="sub_monitorar">
    <a onclick="openPage('restaurante/reservas.html')" data-page="restaurante/reservas.html">Reservas</a>

  </div>

  <!-- DADOS -->
  <div class="menu-item" onclick="toggleSub('sub_dados')">
    <img src="https://cdn-icons-png.flaticon.com/512/1161/1161388.png">
    Análises
  </div>

  <div class="submenu" id="sub_dados">
    <a onclick="openPage('visao-dados.html')" data-page="visao-dados.html">Visão geral</a>
  </div>
     
  <!-- APP / SISTEMA -->
  <div class="menu-item" onclick="openPage('ferramentas/aplicativos.html')" data-page="ferramentas/aplicativos.html">
    <img src="https://cdn-icons-png.flaticon.com/512/1828/1828919.png">
    Aplicativos
  </div>
     
  <!-- CONFIG -->
  <div class="menu-item" onclick="openPage('configuracoes.html')" data-page="configuracoes.html">
    <img src="https://cdn-icons-png.flaticon.com/512/2099/2099058.png">
    Configurações
  </div>

</div>
  </div>

  <!-- BOTÃO LATERAL (AGORA CORRETO) -->
  <div class="menu-indicator" onclick="toggleMobileMenu()">
    ☰
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="header">
      <div style="display:flex;align-items:center;gap:12px">
        <div class="menu-mobile-btn" onclick="toggleMobileMenu()">☰</div>
      </div>

      <div class="user-area">
        <span id="userMail"></span>
        <span class="logout" onclick="logout()">SAIR</span>
      </div>
    </div>

<iframe id="frame" src="painel.html"></iframe>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabaseClient=supabase.createClient(
"https://mblvyircwsaxaslklzky.supabase.co",
"sb_publishable_oN2CuBzXHaUF7NHYS_M7aw_tBqVeD-x"
);

function toggleSub(id){
const el=document.getElementById(id);
el.style.display=el.style.display==="block"?"none":"block";
}

function toggleMobileMenu(){
  const sidebar = document.querySelector(".sidebar");

  sidebar.classList.toggle("open");

  localStorage.setItem("menuAberto", sidebar.classList.contains("open"));
}



function openPage(page){
  document.getElementById("frame").src = page;

  localStorage.setItem("paginaAtual", page); // 🔥 salva

  highlightMenu(page);

  if(window.innerWidth<=768){
    document.querySelector(".sidebar").classList.remove("open");
  }
}

function highlightMenu(page){
document.querySelectorAll(".menu-item").forEach(i=>i.classList.remove("active"));
document.querySelectorAll(".submenu a").forEach(i=>i.classList.remove("active-sub"));
const sub=document.querySelector(`a[data-page="${page}"]`);
if(sub){
sub.classList.add("active-sub");
sub.closest(".submenu").previousElementSibling.classList.add("active");
sub.closest(".submenu").style.display="block";
}
}

function logout(){
localStorage.removeItem("usuarioEmail");
location.href="login.html";
}

window.onload = function(){

  const paginaSalva = localStorage.getItem("paginaAtual");

  if(paginaSalva){
    document.getElementById("frame").src = paginaSalva;
    highlightMenu(paginaSalva);
  }

}
</script>

</body>
</html>
